name: live2d_ai_assistant
description: Live2D AI 助手 - 语音交互 + 口型同步
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3+1
  record: ^5.1.2
  just_audio: ^0.9.39
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.1.0
  webview_flutter: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/live2d/
    - assets/live2d/model_name/
    - assets/sounds/
